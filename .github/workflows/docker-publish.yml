name: Build and Publish Docker Image

# 触发条件：推送 tag (v1.0.0 格式) 或手动触发
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      push_latest:
        description: '同时推送 latest 标签'
        type: boolean
        default: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx（多架构构建支持）
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 提取 Docker 元数据（自动生成标签和描述）
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/flash-games
          tags: |
            # v1.2.3 → 1.2.3
            type=semver,pattern={{version}}
            # v1.2.3 → 1.2
            type=semver,pattern={{major}}.{{minor}}
            # latest 标签
            type=raw,value=latest,enable=${{ github.event_name == 'push' || github.event.inputs.push_latest == 'true' }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: ./vue-flash
          file: ./vue-flash/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 多架构：Intel/AMD + Apple Silicon/树莓派
          platforms: linux/amd64,linux/arm64
          # 使用 GitHub Actions 缓存加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
